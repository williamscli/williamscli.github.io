baseURL: "https://williamscli.github.io/"
languageCode: "en-us"
title: "Your Blog Name"
theme: "PaperMod"

security:
  allowContent:
    - '^text/markdown$'
    - '^text/html$'
    
markup:
  goldmark:
    renderer:
      unsafe: true

params:
  defaultTheme: dark
  disableThemeToggle: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true